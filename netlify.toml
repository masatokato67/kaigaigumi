[build]
  command = "node -v && npm -v && npm run build > /tmp/build.log 2>&1; EXIT_CODE=$?; if [ $EXIT_CODE -ne 0 ]; then mkdir -p out && cp /tmp/build.log out/index.html; fi; exit 0"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  NEXT_PLUGIN_FORCE_RUN = "false"
